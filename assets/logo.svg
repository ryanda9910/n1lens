<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="n1lens">
  <rect width="128" height="128" rx="28" fill="#0D0F12"/>
  <rect x="0.5" y="0.5" width="127" height="127" rx="27.5" stroke="#34D399" stroke-opacity="0.18"/>
  <!-- stacked query rows: one green (the parent), then repeated red rows (the N+1) -->
  <rect x="30" y="34" width="46" height="7" rx="3.5" fill="#34D399"/>
  <rect x="30" y="48" width="34" height="6" rx="3" fill="#F87171"/>
  <rect x="30" y="60" width="34" height="6" rx="3" fill="#F87171"/>
  <rect x="30" y="72" width="34" height="6" rx="3" fill="#F87171"/>
  <rect x="30" y="84" width="34" height="6" rx="3" fill="#F87171" fill-opacity="0.5"/>
  <!-- lens over the repeats -->
  <circle cx="80" cy="72" r="21" fill="none" stroke="#34D399" stroke-width="7"/>
  <line x1="95" y1="87" x2="104" y2="96" stroke="#34D399" stroke-width="8" stroke-linecap="round"/>
</svg>
